<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <title>Abhishek Saini — Senior Software Engineer</title>
    <meta name="description" content="" data-meta="description" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="" data-meta="og:title" />
    <meta property="og:description" content="" data-meta="og:description" />
    <meta property="og:url" content="" data-meta="og:url" />
    <meta property="og:image" content="" data-meta="og:image" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Theme color (matches token base — site defaults to dark) -->
    <meta name="theme-color" content="#0e0e0e" />

    <!-- Favicon -->
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />

    <!-- Fonts: Fraunces (display serif) + Inter (UI sans) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&display=swap"
    />

    <link rel="stylesheet" href="styles.css" />

    <!-- No-flash theme hydration: runs before paint. Defaults to dark. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          document.documentElement.setAttribute(
            'data-theme',
            t === 'light' ? 'light' : 'dark'
          );
        } catch (e) {}
      })();
    </script>

    <!-- Structured data (hydrated from data.js) -->
    <script type="application/ld+json" data-ldjson>
      {}
    </script>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="nav" role="banner">
      <div class="container nav__inner">
        <a href="#top" class="nav__brand" data-brand-link>
          <span class="nav__mark" data-brand-mark></span>
        </a>

        <nav class="nav__links" aria-label="Primary" data-nav-links></nav>

        <div class="nav__actions">
          <button
            type="button"
            class="theme-toggle"
            data-theme-toggle
            aria-label="Toggle color theme"
            title="Toggle theme"
          >
            <svg class="theme-toggle__icon theme-toggle__icon--sun" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="4" fill="currentColor" />
              <g stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
                <line x1="12" y1="2.5" x2="12" y2="5" />
                <line x1="12" y1="19" x2="12" y2="21.5" />
                <line x1="2.5" y1="12" x2="5" y2="12" />
                <line x1="19" y1="12" x2="21.5" y2="12" />
                <line x1="5.2" y1="5.2" x2="6.9" y2="6.9" />
                <line x1="17.1" y1="17.1" x2="18.8" y2="18.8" />
                <line x1="5.2" y1="18.8" x2="6.9" y2="17.1" />
                <line x1="17.1" y1="6.9" x2="18.8" y2="5.2" />
              </g>
            </svg>
            <svg class="theme-toggle__icon theme-toggle__icon--moon" viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M20 14.5A8 8 0 0 1 9.5 4a8 8 0 1 0 10.5 10.5z"
                fill="currentColor"
              />
            </svg>
          </button>

          <button
            type="button"
            class="nav__menu-btn"
            data-menu-toggle
            aria-label="Open menu"
            aria-expanded="false"
            aria-controls="mobile-menu"
          >
            <span></span>
            <span></span>
          </button>
        </div>
      </div>
    </header>

    <!-- Mobile drawer -->
    <div
      class="mobile-menu"
      id="mobile-menu"
      data-mobile-menu
      hidden
      aria-hidden="true"
    >
      <div class="mobile-menu__backdrop" data-menu-close></div>
      <nav class="mobile-menu__panel" aria-label="Mobile" data-mobile-nav-links></nav>
    </div>

    <main id="main">
      <!-- HERO -->
      <section id="top" class="hero" data-section="hero"></section>

      <!-- NOW STRIP -->
      <section class="now" aria-label="Current focus" data-section="now"></section>

      <!-- SELECTED WORK -->
      <section id="work" class="section" data-section="projects"></section>

      <!-- EXPERIENCE -->
      <section id="experience" class="section" data-section="experience"></section>

      <!-- EDUCATION -->
      <section id="education" class="section section--narrow" data-section="education"></section>

      <!-- ABOUT -->
      <section id="about" class="section section--narrow" data-section="about"></section>

      <!-- SKILLS -->
      <section id="skills" class="section" data-section="skills"></section>

      <!-- WRITING -->
      <section id="writing" class="section" data-section="writing"></section>

      <!-- CONTACT -->
      <section id="contact" class="contact" data-section="contact"></section>
    </main>

    <footer class="footer" data-section="footer"></footer>

    <script src="data.js"></script>
    <script src="script.js" defer></script>
  </body>
</html>
